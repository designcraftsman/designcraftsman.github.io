<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Fruits and Vegetables</title>
</head>
<body>

    <header>
        <h1>Healthy Choices</h1>
        <nav>
            <ul>
                <li><a href="#fruits">Fruits</a></li>

    <main>

                <li>Grapes</li>

            <img src="img/pexels-dad-grass-12515978.jpg" alt="Apple Image">
            <img src="img/pexels-eva-bronzini-6914585.jpg" alt="Banana Image">
            <img src="img/pexels-iryna-ilieva-3570410.jpg" alt="Orange Image">
        </section>

        <section id="vegetables">
            <h2>Vegetables</h2>
            <ul>
                <li>Carrot</li>
                <li>Broccoli</li>
                <li>Spinach</li>
                <li>Tomato</li>
                <li>Cucumber</li>
            </ul>
            <img src="img/pexels-kelly-2539172.jpg" alt="Carrot Image">
            <img src="img/pexels-liana-horodetska-8709565.jpg" alt="Broccoli Image">
            <img src="img/pexels-pixabay-209339.jpg" alt="Spinach Image">
        </section>

    <footer>
